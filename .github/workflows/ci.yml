name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend verification suite
        env:
          JWT_SECRET_KEY: ci-secret-key
          API_KEY_ENCRYPTION_KEY: ci-secret-key
        run: python scripts/run_backend_checks.py

      - name: Run a lightweight config smoke test
        env:
          JWT_SECRET_KEY: ci-secret-key
          API_KEY_ENCRYPTION_KEY: ci-secret-key
        run: |
          python -c "import sys; sys.path.append('.'); from app.core.config import settings; print(settings.app_env)"

  frontend-checks:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
